services:
  postgres:
    image: postgres:17-alpine
    container_name: aspectus-postgres
    environment:
      POSTGRES_USER: aspectus
      POSTGRES_PASSWORD: aspectus_dev
      POSTGRES_DB: aspectus
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aspectus"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aspectus-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
