openapi: "3.0.3"
info:
  title: Aspectus API
  description: |
    Pandaria 生态统一身份与多租户管理服务。

    ## 认证

    **管理 API** 使用 Service Token：
    ```
    Authorization: Bearer {service_token}
    ```

    **自省端点** 使用 Service Token 认证调用方，subject token 通过 body 传递。

    **Auth 端点** (`/login`、`/register`、`/logout` 等) 无需认证。

    **OAuth2 端点** (`/authorize`, `/oauth/token`) 无需认证。

    ## Token 类型

    | 前缀 | 类型 |
    |------|------|
    | `pk_live_*` | API Key |
    | `eyJ*` | JWT |
    | `ot_*` | Opaque Token |
    | `rt_*` | Refresh Token |

    ## 错误格式

    所有错误使用 [RFC 7807](https://tools.ietf.org/html/rfc7807) Problem Details：
    ```json
    {
      "type": "https://aspectus.dev/errors/unauthorized",
      "title": "Unauthorized",
      "status": 401,
      "detail": "...",
      "instance": "/path"
    }
    ```

    `/introspect` 对无效 token 返回 `{"active": false}` (HTTP 200)，不返回错误。

  version: "0.9.0"
  contact:
    name: Aspectus Team

servers:
  - url: http://localhost:3100
    description: Development server

tags:
  - name: Introspection
    description: Token 验证（高频热路径）
  - name: Tenants
    description: 租户管理
  - name: Service Accounts
    description: 服务账号管理
  - name: Auth
    description: 用户认证 (登录/注册/登出/密码重置)
  - name: Users
    description: 用户管理
  - name: Roles
    description: 角色管理
  - name: API Keys
    description: API Key 管理
  - name: OAuth2
    description: OAuth2 授权
  - name: System
    description: 健康检查 & 指标

components:
  securitySchemes:
    ServiceToken:
      type: http
      scheme: bearer
      description: Service Token（每个 Project 一个）
  responses:
    NotFound:
      description: 资源不存在
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"

  schemas:
    Tenant:
      type: object
      properties:
        id:
          type: string
          example: "aBcDeFgHiJkLmNoPqRsT"
        name:
          type: string
          example: "Acme Corp"
        quotas:
          type: object
          example: { "pandaria": { "max_concurrent_sessions": 50 } }
        created_at:
          type: string
          format: date-time

    LoginResponse:
      type: object
      description: |
        JWT 登录/注册响应 (ADR-016 增强)

        新增字段：
        - `user`: 当前用户上下文
        - `tenant`: 当前租户上下文
        - `available_projects`: 用户 Role 展开后可访问的生态项目列表

        老客户端可忽略新增字段，向后兼容。
      properties:
        access_token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
        token_format:
          type: string
          enum: [jwt]
        expires_in:
          type: integer
          description: Token TTL in seconds (default 900)
        token_type:
          type: string
          example: "Bearer"
        user:
          type: object
          description: 当前用户上下文（ADR-016）
          properties:
            id:
              type: string
            email:
              type: string
            display_name:
              type: string
              nullable: true
        tenant:
          type: object
          description: 当前租户上下文（ADR-016）
          properties:
            id:
              type: string
            name:
              type: string
              nullable: true
              description: |
                人类可读的租户名称。嵌入 JWT payload 的 `tenant_name` claim。
                如果查询失败则为 null。
        available_projects:
          type: array
          description: |
            用户 Role 展开后的 scope 中 distinct 出的生态项目列表
            （ADR-016 决策 2）。前端可用此显示"alice 可访问 Pandaria、Taver"等 UI。
          items:
            type: string
            enum: [pandaria, tavern, constell, tokencamp, heirloom, emerald]

    LoginLookupResponse:
      type: object
      description: |
        两步登录第一步响应（ADR-016 决策 1）

        - `tenants` 为空数组时代表该邮箱未在任何非挂起租户下注册
        - 始终返回 HTTP 200，避免邮箱枚举
      properties:
        tenants:
          type: array
          items:
            $ref: "#/components/schemas/TenantOption"

    TenantOption:
      type: object
      description: |
        /login/lookup 返回的租户选项。前端展示在"选择租户"页面。

        `logo_url` 是预留字段——`tenants` 表当前未包含该列，
        未来增加后会由 lookup 端点填充。前端应在不存在时降级为首字母。
      properties:
        tenant_id:
          type: string
          description: 租户 ID，可作为后续 /login 的 `tenant_id` 参数传入
        tenant_name:
          type: string
          description: 租户名称，人类可读
        logo_url:
          type: string
          nullable: true
          description: 租户 logo URL（预留字段，当前不会返回）

    ServiceAccount:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        email:
          type: string
        display_name:
          type: string
          nullable: true
        is_suspended:
          type: boolean
        last_sign_in_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatedApiKey:
      type: object
      description: API Key 创建响应（原文仅返回一次）
      properties:
        id:
          type: string
        key:
          type: string
          description: API Key 原文（`pk_live_` 格式）。仅此一次，请安全保存。
          example: "pk_live_aBcDeFgHiJkLmNoPqRsT..."
        key_prefix:
          type: string
          example: "pk_live_aBcDeFgH"
        project:
          type: string
          enum: [pandaria, tavern, emerald, constell, tokencamp, heirloom]
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true

    ApiKeyListItem:
      type: object
      properties:
        id:
          type: string
        service_account_id:
          type: string
        project:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [user, service_account, both]
        is_default:
          type: boolean

    IntrospectResponse:
      type: object
      properties:
        active:
          type: boolean
        tenant_id:
          type: string
        user_id:
          type: string
        identity_type:
          type: string
          enum: [user, service_account]
        client_id:
          type: string
        scope:
          type: string
          description: 空格分隔的 scope 列表
        token_type:
          type: string
        token_format:
          type: string
          enum: [api_key, jwt, opaque]
        exp:
          type: integer
          format: int64
        quotas:
          type: object

    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_format:
          type: string
          enum: [jwt, opaque]
        expires_in:
          type: integer
        token_type:
          type: string
        refresh_token:
          type: string

paths:
  # ── System ──
  /health:
    get:
      tags: [System]
      summary: 健康检查
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  db:
                    type: string
                  redis:
                    type: string

  /metrics:
    get:
      tags: [System]
      summary: Prometheus 指标
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  # ── Introspection ──
  /introspect:
    post:
      tags: [Introspection]
      summary: Token 自省 (RFC 7662)
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 待验证的 token
                token_type_hint:
                  type: string
                  description: 可选。`api_key` | `jwt` | `opaque`
      responses:
        "200":
          description: 自省结果
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/IntrospectResponse"
                  - type: object
                    properties:
                      active:
                        type: boolean
                        enum: [false]
        "401":
          description: Service Token 无效
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  # ── Tenants ──
  /tenants:
    post:
      tags: [Tenants]
      summary: 创建租户
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 128
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}:
    get:
      tags: [Tenants]
      summary: 查询租户
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          $ref: "#/components/responses/NotFound"

  /tenants/{id}/quotas:
    put:
      tags: [Tenants]
      summary: 更新租户配额
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "204":
          description: 更新成功

  # ── Service Accounts ──
  /service-accounts:
    post:
      tags: [Service Accounts]
      summary: 创建服务账号
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, label]
              properties:
                tenant_id:
                  type: string
                label:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
    get:
      tags: [Service Accounts]
      summary: 列出服务账号
      security:
        - ServiceToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceAccount"

  /service-accounts/{id}:
    get:
      tags: [Service Accounts]
      summary: 查询服务账号
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceAccount"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Users ──
  /users:
    post:
      tags: [Users]
      summary: 创建用户
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, email, password]
              properties:
                tenant_id:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
      responses:
        "201":
          description: 创建成功（不返回 password_hash）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    get:
      tags: [Users]
      summary: 列出用户
      security:
        - ServiceToken: []
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      tags: [Users]
      summary: 查询用户
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/suspend:
    put:
      tags: [Users]
      summary: 挂起/恢复用户
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suspended]
              properties:
                suspended:
                  type: boolean
      responses:
        "204":
          description: 操作成功

  /users/{id}/roles:
    post:
      tags: [Roles]
      summary: 为用户分配角色
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: string
      responses:
        "201":
          description: 分配成功
        "422":
          description: role_type 不匹配（如给 User 分配 service_account 专属 Role）

  /users/{id}/roles/{role_id}:
    delete:
      tags: [Roles]
      summary: 移除用户角色
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
        - name: role_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 移除成功

  # ── Roles ──
  /roles:
    get:
      tags: [Roles]
      summary: 列出所有角色
      security:
        - ServiceToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"

  # ── API Keys ──
  /api-keys:
    post:
      tags: [API Keys]
      summary: 创建 API Key
      description: |
        创建 API Key。支持两种格式：
        - **新格式 (v0.5+)**：`owner_type` + `owner_id`
        - **旧格式 (v0.2-v0.4)**：`service_account_id`（向后兼容）
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project]
              properties:
                owner_type:
                  type: string
                  enum: [user, service_account]
                owner_id:
                  type: string
                service_account_id:
                  type: string
                  description: 向后兼容（v0.2-v0.4）
                project:
                  type: string
                  enum:
                    - pandaria
                    - tavern
                    - emerald
                    - constell
                    - tokencamp
                    - heirloom
                scopes:
                  type: array
                  items:
                    type: string
                expires_at:
                  type: string
                  format: date-time
      responses:
        "201":
          description: 创建成功。`key` 字段仅此一次返回。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedApiKey"
    get:
      tags: [API Keys]
      summary: 列出 API Key
      security:
        - ServiceToken: []
      parameters:
        - name: service_account_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK（不含 key_hash 和原文）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyListItem"

  /api-keys/{id}:
    get:
      tags: [API Keys]
      summary: 查询 API Key
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK（不含 key_hash 和原文）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyListItem"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [API Keys]
      summary: 吊销 API Key
      security:
        - ServiceToken: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 吊销成功（幂等）

  # ── Auth (v0.9.0) ──
  /login/lookup:
    post:
      tags: [Auth]
      summary: 两步登录第一步 — 查询邮箱关联的租户
      description: |
        ADR-016 两步登录的第一步：仅传入邮箱，返回该邮箱在哪些
        (非挂起) 租户下注册。客户端让用户选择租户后，再调用 `/login`
        并传入 `tenant_id`。

        **安全**：
        - 无论邮箱是否存在，均返回 HTTP 200 + 空数组，避免邮箱枚举
        - 托管 suspended 用户不出现在列表中
        - 请求受到 rate limit（与 /login 共享限流配额）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: 查询成功（无论邮箱是否存在均返回 200）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginLookupResponse"
        "422":
          description: email 格式不合法
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /login:
    post:
      tags: [Auth]
      summary: 用户登录（ADR-016 两步法第二步）
      description: |
        email + password + tenant_id → JWT access_token + refresh_token。

        **必须先调用** `POST /login/lookup` 获取 tenant_id（ADR-016 两步登录）。

        为什么需要 `tenant_id`：同一个邮箱可以在多个租户下注册
        （schema UNIQUE (tenant_id, email)）。如果省略 `tenant_id`，
        API 无法确定登录的是哪个身份。

        响应为 401 时不区分"邮箱不存在"、"邮箱存在但 password 错"、
        "邮箱存在但 tenant_id 错"——一律返回 `Invalid email or password`，
        避免信息泄漏。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenant_id]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                tenant_id:
                  type: string
                  description: |
                    租户 ID。来自 `POST /login/lookup` 返回的
                    `tenants[].tenant_id`。必填。
                client_id:
                  type: string
                  description: 登录的项目
                  default: "pandaria"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT access token
                  refresh_token:
                    type: string
                  token_format:
                    type: string
                    enum: [jwt]
                  expires_in:
                    type: integer
                  token_type:
                    type: string
        "401":
          description: 邮箱或密码错误（不区分哪个错）
        "403":
          description: 账号已被挂起

  /register:
    post:
      tags: [Auth]
      summary: 用户注册（ADR-016：demo/dev only）
      description: |
        创建新账号并自动登录返回 JWT。

        **仅限 demo/dev 环境使用**（需 `ASPECTUS_REGISTRATION_ENABLED=true`）。
        生产环境应由管理员调用 `POST /users`（Service Token 认证）创建用户。

        **ADR-016 决策 6**：本端点不再自动创建 tenant。`tenant_id` 必须已存在；
        否则返回 404。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenant_id]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                display_name:
                  type: string
                tenant_id:
                  type: string
                  description: |
                    加入的租户。**必须已存在**（ADR-016 决策 6）。
                    默认值 `"default"` 仍可传，但仅当数据库中存在名为
                    `default` 的 tenant 时会成功。
                    生产环境不要依赖 default — 传明确租户 ID。
                client_id:
                  type: string
                  default: "pandaria"
      responses:
        "200":
          description: 注册成功，自动登录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "403":
          description: 公开注册已禁用（ASPECTUS_REGISTRATION_ENABLED != true）
        "404":
          description: |
            tenant_id 不存在。ADR-016 决策 6：不再自动创建 tenant。
            错误消息会指引使用 `POST /tenants`（Service Token 认证）。
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: 邮箱格式无效、密码过短、或邮箱已被注册

  /logout:
    post:
      tags: [Auth]
      summary: 退出登录
      description: 吊销 refresh_token，可选吊销 access_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                access_token:
                  type: string
                  description: 可选，同时吊销 JWT
      responses:
        "204":
          description: 退出成功（幂等）

  /forgot-password:
    post:
      tags: [Auth]
      summary: 忘记密码
      description: |
        输入邮箱，生成密码重置 token（开发环境日志输出重置链接）。
        无论邮箱是否存在，始终返回相同消息（防枚举）。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: 如果该邮箱已注册，重置链接已发送
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /reset-password:
    post:
      tags: [Auth]
      summary: 重置密码
      description: 验证重置 token，更新密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: 从重置链接中获取的 token
                new_password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: 密码已重置
        "422":
          description: token 无效或已过期，或密码过短

  # ── OAuth2 ──
  /authorize:
    post:
      tags: [OAuth2]
      summary: 授权端点
      description: 验证 email + password，返回 authorization code (TTL=60s)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, client_id, redirect_uri]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                client_id:
                  type: string
                redirect_uri:
                  type: string
                  format: uri
      responses:
        "200":
          description: 授权成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  redirect_uri:
                    type: string
        "401":
          description: 认证失败

  /oauth/token:
    post:
      tags: [OAuth2]
      summary: Token 端点
      description: |
        支持 grant_type：
        - `authorization_code`：用 code 换取 access_token + refresh_token
        - `refresh_token`：用 refresh_token 轮转获取新 token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                client_id:
                  type: string
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token 响应
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: code 无效或过期

  /clients:
    post:
      tags: [OAuth2]
      summary: 注册 OAuth2 Client
      security:
        - ServiceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, redirect_uris]
              properties:
                name:
                  type: string
                redirect_uris:
                  type: array
                  items:
                    type: string
                    format: uri
      responses:
        "201":
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_id:
                    type: string
                  name:
                    type: string
    get:
      tags: [OAuth2]
      summary: 列出所有 OAuth2 Client
      security:
        - ServiceToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    client_id:
                      type: string
                    name:
                      type: string
                    redirect_uris:
                      type: array
                      items:
                        type: string

  /.well-known/jwks.json:
    get:
      tags: [OAuth2]
      summary: JWKS 公钥端点
      description: 返回 JWT 验签所需的 RSA 公钥
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
