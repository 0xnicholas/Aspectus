apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aspectus.fullname" . }}
  labels:
    {{- include "aspectus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aspectus.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "aspectus.labels" . | nindent 8 }}
    spec:
      containers:
        - name: aspectus
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "aspectus.fullname" . }}-secret
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "aspectus.fullname" . }}-secret
                  key: redis-url
            - name: JWT_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "aspectus.fullname" . }}-secret
                  key: jwt-private-key-pem
            - name: JWT_PUBLIC_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "aspectus.fullname" . }}-secret
                  key: jwt-public-key-pem
            - name: ASPECTUS_ADMIN_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "aspectus.fullname" . }}-secret
                  key: admin-service-token
            - name: DB_MAX_CONNECTIONS
              value: {{ .Values.config.dbMaxConnections | quote }}
            - name: DB_MIN_CONNECTIONS
              value: {{ .Values.config.dbMinConnections | quote }}
            - name: JWT_TTL_SECONDS
              value: {{ .Values.config.jwtTtlSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.config.rustLog | quote }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
