# Default values for Aspectus Helm chart.

replicaCount: 3

image:
  repository: ghcr.io/pandaria/aspectus
  pullPolicy: IfNotPresent
  tag: "1.0.0"

service:
  type: ClusterIP
  port: 3100

# Environment configuration (non-sensitive)
config:
  port: 3100
  dbMaxConnections: 50
  dbMinConnections: 10
  jwtTtlSeconds: 900
  rustLog: "aspectus_server=info,tower_http=info"

# Secrets (use external secrets manager in production)
# These are template placeholders; actual values should come from
# a Kubernetes Secret created separately or via External Secrets Operator.
secrets:
  databaseUrl: ""
  redisUrl: ""
  jwtPrivateKeyPem: ""
  jwtPublicKeyPem: ""
  # Service tokens: base64-encoded JSON map of project→token
  # {"pandaria": "...", "constell": "...", ...}
  # Note: 'tavern' removed 2026-06-21 (merged into Pandaria).
  serviceTokens: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Health check probes
probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health?full=true
    initialDelaySeconds: 3
    periodSeconds: 5

# Ingress (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: identity.pandaria.dev
      paths:
        - path: /
          pathType: Prefix

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity (anti-affinity for HA)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - aspectus
          topologyKey: kubernetes.io/hostname
